[project]
name = "scripvec-retrieval"
version = "0.0.0"
description = "Embedding client, sqlite-vec dense index, BM25S lexical index, and RRF hybrid fusion."
requires-python = ">=3.12"
dependencies = [
  "scripvec-corpus-ingest",
  "scripvec-reference",
  "httpx",
  "sqlite-vec",
  "bm25s",
  "numpy",
]

[tool.uv.sources]
scripvec-corpus-ingest = { workspace = true }
scripvec-reference = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scripvec_retrieval"]
